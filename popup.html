<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SimplyComment</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0d10;
      --surface: #13151a;
      --surface-inset: #0f1014;
      --border-subtle: rgba(255, 255, 255, 0.08);
      --border-hover: #363a46;
      --text: #eef0f4;
      --muted: #8b919c;
      --accent: #0a66c2;
      --accent-hover: #004182;
      --accent-muted: rgba(10, 102, 194, 0.22);
      --shadow-cta: 0 1px 0 rgba(255, 255, 255, 0.14) inset, 0 2px 10px rgba(10, 102, 194, 0.38);
      --shadow-cta-raised: 0 1px 0 rgba(255, 255, 255, 0.2) inset, 0 8px 18px rgba(10, 102, 194, 0.32), 0 2px 0 rgba(0, 0, 0, 0.3);
      --shadow-btn: 0 1px 0 rgba(255, 255, 255, 0.04) inset, 0 1px 2px rgba(0, 0, 0, 0.32);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --success: #5ecf9a;
      --error: #e0706e;
      --radius: 10px;
      --radius-sm: 8px;
    }
    body {
      width: 420px;
      padding: 14px 16px 16px;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-y: auto;
      scrollbar-width: none;
    }
    body::-webkit-scrollbar { width: 0; height: 0; display: none; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand img { width: 30px; height: 30px; border-radius: 8px; }
    .brand h1 { font-size: 19px; letter-spacing: -0.03em; }
    .settings-btn {
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--muted);
      padding: 7px 10px;
      cursor: pointer;
    }
    .settings-btn:hover { color: var(--text); border-color: var(--border-hover); }
    .mode-switch, .actions-row, .chip-row { display: flex; gap: 8px; }
    .mode-switch { margin-bottom: 12px; }
    .mode-btn, .chip, .secondary {
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--muted);
      padding: 8px 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all .28s var(--ease);
    }
    .mode-btn { flex: 1; }
    .mode-btn--active { color: var(--text); border-color: var(--accent); background: var(--accent-muted); }
    .chip-row { margin-top: 8px; flex-wrap: wrap; }
    .chip { font-size: 11px; padding: 6px 10px; border-radius: 999px; }
    label {
      display: block; margin: 12px 0 7px;
      color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
    }
    textarea {
      width: 100%; border: 1px solid var(--border-subtle); border-radius: var(--radius);
      background: var(--surface); color: var(--text); padding: 10px 12px; resize: none; outline: none;
    }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-muted); }
    #postText {
      height: 200px;
      scrollbar-width: thin;
      scrollbar-color: #2a2d36 transparent;
    }
    #postText::-webkit-scrollbar { width: 7px; }
    #postText::-webkit-scrollbar-track { background: transparent; }
    #postText::-webkit-scrollbar-thumb {
      background: #2a2d36;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, 0.2);
    }
    #postText::-webkit-scrollbar-thumb:hover { background: #353946; }
    #gist { min-height: 155px; }
    #outputCard {
      min-height: 148px; border: 1px solid var(--border-subtle); border-radius: var(--radius);
      background: var(--surface-inset); padding: 12px 14px; font-size: 14px; line-height: 1.55; white-space: pre-wrap;
    }
    #outputCard.empty { color: var(--muted); }
    .primary {
      width: 100%; border: none; border-radius: var(--radius-sm);
      background: var(--accent); color: #fff; font-weight: 700; padding: 11px 14px; cursor: pointer;
      box-shadow: var(--shadow-cta); transform: translateY(0); transition: all .32s var(--ease);
    }
    .primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: var(--shadow-cta-raised); }
    .actions-row { margin-top: 8px; }
    .secondary { flex: 1; color: var(--text); box-shadow: var(--shadow-btn); transform: translateY(0); }
    .secondary:hover { border-color: var(--border-hover); transform: translateY(-2px); }
    .status { min-height: 18px; margin-top: 8px; text-align: center; font-size: 12px; }
    .status.success { color: var(--success); }
    .status.error { color: var(--error); }
    .hide { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <img src="icon48.png" alt="" />
      <h1>SimplyComment</h1>
    </div>
    <button class="settings-btn" id="openSettings">Settings</button>
  </div>

  <div class="mode-switch">
    <button class="mode-btn mode-btn--active" data-mode="polish">Polish my draft</button>
    <button class="mode-btn" data-mode="ideate">Help me ideate</button>
  </div>

  <label for="postText">Source post</label>
  <textarea id="postText" placeholder="Paste the full post you want to reply to."></textarea>

  <div id="angleWrap">
    <label for="gist">Your take</label>
    <textarea id="gist" placeholder="Write rough thoughts. We refine into one strong comment."></textarea>
    <div class="chip-row">
      <button class="chip" data-chip="I agree, because">Agree and why</button>
      <button class="chip" data-chip="I respectfully disagree, because">Respectful pushback</button>
      <button class="chip" data-chip="Curious what you think about">Ask a smart question</button>
      <button class="chip" data-chip="One practical takeaway is">Practical takeaway</button>
    </div>
  </div>

  <label>Generate</label>
  <button class="primary" id="generate">Generate comment</button>

  <label>Generated comment</label>
  <div id="outputCard" class="empty">Your one-sentence comment appears here.</div>
  <div class="actions-row">
    <button class="secondary" id="copyOutput">Copy</button>
    <button class="secondary" id="regenerate">Regenerate</button>
    <button class="secondary" id="moreDirect">More direct</button>
  </div>
  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
